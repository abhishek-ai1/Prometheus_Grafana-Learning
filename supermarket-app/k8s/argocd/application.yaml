---
# ArgoCD Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: argocd

---
# ArgoCD Application CRD (will be used after ArgoCD installation)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: supermarket-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/abhishek-ai1/Prometheus_Grafana-Learning.git
    targetRevision: main
    # deploy using the Helm chart under supermarket-app/helm/supermarket
    path: supermarket-app/helm/supermarket
    helm:
      values: |
        registry: test
        appName: supermarket-app
        imageTag: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: supermarket
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 10
