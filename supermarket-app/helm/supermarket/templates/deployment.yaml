{{- range .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace | default "supermarket" }}
  labels:
    app: {{ .name }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .metricsPort }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: {{ .name }}
        image: {{ if and $.Values.registry (ne $.Values.registry "") }}{{ $.Values.registry }}/{{ $.Values.appName }}-{{ .name }}:{{ $.Values.imageTag }}{{- else }}{{ $.Values.appName }}-{{ .name }}:{{ $.Values.imageTag }}{{- end }}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ .port }}
          name: http
        envFrom:
        - configMapRef:
            name: {{ .name }}-config
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .port }}
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .port }}
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
{{- end }}