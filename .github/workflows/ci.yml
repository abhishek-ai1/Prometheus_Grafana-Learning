name: CI

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service,bff,core-service,customer-mgmt,ui-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          cd supermarket-app/services/${{ matrix.service }}
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Syntax check
        run: |
          python -m py_compile supermarket-app/services/${{ matrix.service }}/*.py || true

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 supermarket-app/services/${{ matrix.service }} || true

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: supermarket-app/services/${{ matrix.service }}
          file: supermarket-app/services/${{ matrix.service }}/Dockerfile
          push: false
          tags: test/${{ matrix.service }}:latest

  terraform:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform fmt check
        run: |
          cd supermarket-app/terraform
          terraform fmt -recursive

      - name: Terraform init & validate
        run: |
          cd supermarket-app/terraform
          terraform init -backend=false
          terraform validate

  yaml-lint:
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          curl -sLo kubeval https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64
          chmod +x kubeval
          sudo mv kubeval /usr/local/bin/

      - name: Validate YAML manifests
        run: |
          find supermarket-app/k8s -name "*.yaml" -exec kubeval {} \;

  argo-integration:
    runs-on: ubuntu-latest
    needs: yaml-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Kind cluster
        uses: engineerd/setup-kind@v0.5.0
        with:
          version: v0.23.0
          nodes: 1

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Build and load Docker images
        run: |
          # Build images with correct naming convention
          docker build -t supermarket-app-auth-service:latest ./supermarket-app/services/auth-service
          docker build -t supermarket-app-bff-service:latest ./supermarket-app/services/bff
          docker build -t supermarket-app-core-service:latest ./supermarket-app/services/core-service
          docker build -t supermarket-app-customer-mgmt:latest ./supermarket-app/services/customer-mgmt
          docker build -t supermarket-app-ui-service:latest ./supermarket-app/services/ui-service

          # Load into Kind cluster
          kind load docker-image supermarket-app-auth-service:latest
          kind load docker-image supermarket-app-bff-service:latest
          kind load docker-image supermarket-app-core-service:latest
          kind load docker-image supermarket-app-customer-mgmt:latest
          kind load docker-image supermarket-app-ui-service:latest

      - name: Deploy application with Helm
        run: |
          kubectl create namespace supermarket || true
          helm upgrade --install supermarket ./supermarket-app/helm/supermarket \
            --namespace supermarket \
            --set registry="" \
            --set appName=supermarket-app \
            --set imageTag=latest \
            --wait \
            --timeout=300s
            
      - name: Debug Kubernetes
        if: failure()
        run: |
            echo "====All Resources===="
            kubectl get all -n supermarket
            echo "====Pod Details===="
            kubectl get po -A -n supermarket
            echo "====Pod Logs===="  
            kubectl logs -n supermarket --all-containers=true --tail=100

      - name: Install ArgoCD
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --set server.service.type=ClusterIP \
            --wait \
            --timeout=300s

      - name: Deploy ArgoCD application
        run: |
          kubectl apply -f supermarket-app/k8s/argocd/application.yaml
          kubectl get applications -n argocd
